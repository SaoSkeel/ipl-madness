name: Sync Results Cron

on:
  schedule:
    - cron: '*/30 * * * *'  # Runs every 30 minutes

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Sync Results
        id: curl_request
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
          -H "x-admin-password: ${{ secrets.ADMIN_PASSWORD }}" \
          https://https://ipl-madness.onrender.com/api/admin/sync)

          echo "::set-output name=status_code::$RESPONSE"

      - name: Check Status Code and Send Notification
        if: steps.curl_request.outputs.status_code != '200'
        run: |
          echo "Sync Results failed with status code: ${{ steps.curl_request.outputs.status_code }}"
          # You can add more sophisticated notification logic here, such as sending
          # an email or posting to a Slack channel.
          # For example, using a Slack webhook:
          # curl -X POST -H 'Content-type: application/json' --data '{"text":"Sync Results failed!"}' YOUR_SLACK_WEBHOOK_URL
